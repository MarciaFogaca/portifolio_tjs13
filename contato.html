<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Márcia Telles</title>
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
</head>
<body>
    <header>
        <div class="menu-content">
            <a href="index.html" id="titulo">Portfólio</a>
            <nav>
                <ul class="menu-list">
                    <li><a href="index.html#hero">Início</a></li>
                    <li><a href="index.html#about">Sobre</a></li>
                    <li><a href="index.html#projects">Projetos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-container">
            <h1>Entre em Contato</h1>
            <p>Vamos conversar sobre tecnologia, <strong>Apple</strong> ou novos projetos!</p>
            
            <form action="success.html">
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="Seu e-mail" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" placeholder="Como posso te ajudar?" required></textarea><br><br>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Desenvolvido por Márcia Telles - 2026</p>
    </footer>
</body>
</html>
